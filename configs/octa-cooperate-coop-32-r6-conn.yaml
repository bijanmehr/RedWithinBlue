# Eight-agent cooperation on a 32x32 open grid with TIGHT comm_radius=6.
# Connectivity-restoration variant: bring cooperative_weight back from 0
# (the over-correcting nocoop ablation) but at 1/3 of the original strength.
#
# Lineage:
#   octa-cooperate-coop-32-r6        (coop=0.015) -> connected_frac 1.000,
#                                                    coverage 41.9 % (cluster bias)
#   octa-cooperate-coop-32-r6-nocoop (coop=0.000) -> coverage rose to 55.9 %
#                                                    on raw warm-start, but
#                                                    fine-tune fragmented
#                                                    (connected_frac 0.269,
#                                                    cascading via the eval-
#                                                    guardrail all-True
#                                                    fallback at brittle-chain
#                                                    configurations)
#   octa-cooperate-coop-32-r6-conn   (coop=0.005) -> THIS RUN: smallest-bite
#                                                    cohesion signal that
#                                                    should restore connectivity
#                                                    without re-collapsing the
#                                                    cluster.
#
# Companion code change: rollout.py::_connectivity_mask fallback now allows
# only STAY (not all 5 actions) when no action preserves connectivity. This
# matches the JIT training-path semantics in _connectivity_guardrail and
# eliminates the cascade mechanism that broke the nocoop run at eval time.
#
# All other knobs identical to octa-cooperate-coop-32-r6.yaml. Same warm-
# start path (the N=4 32x32 checkpoint with per-agent block tiling x2),
# same gentle fine-tune recipe.
experiment_name: octa-cooperate-coop-32-r6-conn

env:
  grid_width: 32
  grid_height: 32
  num_agents: 8
  wall_density: 0.0
  max_steps: 400
  comm_radius: 6.0
  obs_radius: 0
  center_spawn: true

network:
  actor_hidden_dim: 256         # MUST match source checkpoint (quad-32).
  actor_num_layers: 3
  critic_hidden_dim: 256        # MUST match source so critic can warm-start.
  critic_num_layers: 3
  activation: relu

train:
  method: actor_critic
  lr: 1.0e-5
  gamma: 0.99
  num_episodes: 500
  num_seeds: 5
  ent_coef: 0.005
  epsilon: 0.005
  epsilon_final: 0.005
  ent_coef_final: 0.005
  anneal_end_frac: 0.5
  grad_clip: 0.25

reward:
  disconnect_penalty: 0.0
  isolation_weight: -0.002
  cooperative_weight: 0.005     # 1/3 of original 0.015. Smallest signal that
                                # should keep agents within mutual comm range
                                # without inducing the cluster collapse.
  revisit_weight: -0.001
  terminal_bonus_scale: 8.0
  terminal_bonus_divide: true

enforce_connectivity: true

warm_start: experiments/quad-cooperate-coop-32/checkpoint.npz
warm_start_source_num_agents: 4
