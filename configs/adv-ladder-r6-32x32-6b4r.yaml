# Adversarial ladder, RUNG 6 — 32x32, 6 blue vs 4 red. Warm-start blue actor
# from rung 5 (32x32 7b3r); same grid so the warm-start is pure N retiling
# (7 blue -> 6 blue blocks, but blue actor is per-agent shared so the actor
# only needs num_blocks=1 — effectively a verbatim load).
#
# Red is FRESH: jumping 3 -> 4 reds reshapes the JointRedActor input, so the
# rung-5 red checkpoint is not shape-compatible.
#
# 6v4 is a stress test for adversarial behaviour: red team is large enough
# to actively corral blue, blue team is small enough that fragmenting them
# is plausible. If we're going to see coordinated mission denial, here.
experiment_name: adv-ladder-r6-32x32-6b4r

env:
  grid_width: 32
  grid_height: 32
  num_agents: 10           # 6 blue + 4 red
  num_red_agents: 4
  wall_density: 0.0
  max_steps: 300           # 32x32 = 1024 cells; ~50 cells per blue at N=6
  comm_radius: 6.0
  obs_radius: 1
  view_radius: 1
  survey_radius: 0
  local_obs: true
  center_spawn: true
  normalize_uid: true

network:
  actor_hidden_dim: 128
  actor_num_layers: 2
  critic_hidden_dim: 128
  critic_num_layers: 2
  activation: relu

train:
  method: reinforce
  red_policy: joint
  red_hidden_dim: 128
  red_num_layers: 2
  red_pretrain_episodes: 0
  lr: 1.0e-4
  gamma: 0.99
  num_episodes: 20000
  num_seeds: 2
  ent_coef: 0.05
  grad_clip: 0.5

reward:
  disconnect_penalty: 0.0
  isolation_weight: 0.0
  cooperative_weight: 0.0
  revisit_weight: 0.0
  spread_weight: 0.0
  terminal_bonus_scale: 10.0
  terminal_bonus_divide: true
  fog_potential_weight: 0.1

enforce_connectivity: true

warm_start: experiments/adv-ladder-r5-32x32-7b3r/checkpoint.npz
warm_start_source_num_agents: 6
