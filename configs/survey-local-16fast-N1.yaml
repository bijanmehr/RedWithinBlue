# Stepping-stone for the 16x16 N=5 tight-budget run (≤100 steps).
#
# Solo agent on 16x16, max_steps=100 — teaches the kernel a 16x16 obs world
# under a short horizon so the N=5 rung can inherit a time-pressured actor.
# Warm-starts from the 8x8 N=1 policy (local_obs=true makes it a kernel no-op).
experiment_name: survey-local-16fast-N1

env:
  grid_width: 16
  grid_height: 16
  num_agents: 1
  wall_density: 0.0
  max_steps: 100
  comm_radius: 5.0
  obs_radius: 1
  view_radius: 1
  survey_radius: 0
  local_obs: true
  center_spawn: true
  normalize_uid: true

network:
  actor_hidden_dim: 128
  actor_num_layers: 2
  critic_hidden_dim: 128
  critic_num_layers: 2
  activation: relu

train:
  method: actor_critic
  lr: 2.0e-4
  gamma: 0.99
  num_episodes: 3000
  num_seeds: 5
  ent_coef: 0.02
  epsilon: 0.05
  epsilon_final: 0.005
  ent_coef_final: 0.005
  anneal_end_frac: 0.5
  grad_clip: 0.25

reward:
  disconnect_penalty: 0.0
  isolation_weight: 0.0
  cooperative_weight: 0.0
  revisit_weight: -0.002                 # stronger under tight horizon
  terminal_bonus_scale: 4.0
  terminal_bonus_divide: true

enforce_connectivity: false              # N=1 has no graph edges

warm_start: experiments/survey-local-8-N1/checkpoint.npz
warm_start_source_num_agents: 1
