# Rung 3 of the survey-local warm-start ladder.
#
# 4 agents on 16x16. Warm-starts from the 8x8 N=2 rung.
#
# Because local_obs=true keeps obs_dim grid-invariant (seen field is
# view-sized, not H*W), the grid-size change from 8x8 -> 16x16 is a no-op
# for the Dense_0 kernel — only the 2 -> 4 block tiling is needed.
# max_steps scales with grid area to give the team time to cover more cells.
experiment_name: survey-local-16-N4

env:
  grid_width: 16
  grid_height: 16
  num_agents: 4
  wall_density: 0.0
  max_steps: 200
  comm_radius: 5.0
  obs_radius: 1
  view_radius: 1
  survey_radius: 0
  local_obs: true
  center_spawn: true
  normalize_uid: true

network:
  actor_hidden_dim: 128
  actor_num_layers: 2
  critic_hidden_dim: 128
  critic_num_layers: 2
  activation: relu

train:
  method: actor_critic
  lr: 5.0e-5                      # gentle off a converged source
  gamma: 0.99
  num_episodes: 2000
  num_seeds: 5
  ent_coef: 0.01
  epsilon: 0.005
  epsilon_final: 0.005
  ent_coef_final: 0.005
  anneal_end_frac: 0.5
  grad_clip: 0.25

reward:
  disconnect_penalty: 0.0
  isolation_weight: -0.002
  cooperative_weight: 0.015
  revisit_weight: -0.001
  terminal_bonus_scale: 6.0
  terminal_bonus_divide: true

enforce_connectivity: true

warm_start: experiments/survey-local-8-N2/checkpoint.npz
warm_start_source_num_agents: 2
