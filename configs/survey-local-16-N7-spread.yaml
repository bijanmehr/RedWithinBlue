# 7 agents on 16x16 — off-ladder rung.
#
# Tile constraint: num_blocks % source_num_blocks == 0, and 7 is prime, so the
# only viable warm-start source is the N=1 rung. survey-local-8-N1 is the
# freshest N=1 checkpoint; local_obs=true makes the 8x8 -> 16x16 grid change
# a no-op for the actor+critic kernels (seen field is view-sized).
#
# Recipe: spread-reward variant (coop=0, spread=0.003, revisit=-0.005).
# Density here is 7/256 = 2.7% — between N=4/16x16 (1.6%, saturated under
# either recipe) and N=8/32x32 (0.8%, spread was essential to break the
# clustering floor). Spread is the safer pick because it generalized across
# both tested densities without a clustering catastrophe.
experiment_name: survey-local-16-N7-spread

env:
  grid_width: 16
  grid_height: 16
  num_agents: 7
  wall_density: 0.0
  max_steps: 300
  comm_radius: 5.0
  obs_radius: 1
  view_radius: 1
  survey_radius: 0
  local_obs: true
  center_spawn: true
  normalize_uid: true

network:
  actor_hidden_dim: 128
  actor_num_layers: 2
  critic_hidden_dim: 128
  critic_num_layers: 2
  activation: relu

train:
  method: actor_critic
  lr: 1.0e-4                      # solo source -> bigger tile jump, needs more fine-tune
  gamma: 0.99
  num_episodes: 3000
  num_seeds: 5
  ent_coef: 0.01
  epsilon: 0.01
  epsilon_final: 0.005
  ent_coef_final: 0.005
  anneal_end_frac: 0.5
  grad_clip: 0.25

reward:
  disconnect_penalty: 0.0
  isolation_weight: 0.0
  cooperative_weight: 0.0
  revisit_weight: -0.005
  spread_weight: 0.003
  terminal_bonus_scale: 7.0
  terminal_bonus_divide: true

enforce_connectivity: true

warm_start: experiments/survey-local-16-N1/checkpoint.npz
warm_start_source_num_agents: 1
