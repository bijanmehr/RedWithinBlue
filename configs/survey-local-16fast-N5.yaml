# Tight-budget N=5 on 16x16: target ≥95% coverage in ≤100 steps.
#
# Key design choices:
#   - max_steps=100  — hard deadline set by the goal.  5×100 = 500 agent-steps
#     vs ~196 playable cells (14x14 after wall border), so the per-agent sweep
#     budget is generous (≈40 cells per agent).
#   - Warm-start: survey-local-16fast-N1 (tile 1→5).  Critic transfers cleanly
#     because 5 % 1 == 0.  Fixes the "fresh critic caps coverage" mode.
#   - Spread recipe (coop=0, spread=0.003, revisit stronger).  Under a tight
#     horizon, cooperative-pull wastes steps pulling agents toward each other;
#     spread pushes them into non-overlapping sweep lanes.
#   - terminal_bonus_scale=10 to make full coverage heavily reward-positive
#     relative to the per-step noise.
experiment_name: survey-local-16fast-N5

env:
  grid_width: 16
  grid_height: 16
  num_agents: 5
  wall_density: 0.0
  max_steps: 100
  comm_radius: 5.0
  obs_radius: 1
  view_radius: 1
  survey_radius: 0
  local_obs: true
  center_spawn: true
  normalize_uid: true

network:
  actor_hidden_dim: 128
  actor_num_layers: 2
  critic_hidden_dim: 128
  critic_num_layers: 2
  activation: relu

train:
  method: actor_critic
  lr: 5.0e-5
  gamma: 0.99
  num_episodes: 5000
  num_seeds: 5
  ent_coef: 0.01
  epsilon: 0.01
  epsilon_final: 0.005
  ent_coef_final: 0.005
  anneal_end_frac: 0.5
  grad_clip: 0.25

reward:
  disconnect_penalty: 0.0
  isolation_weight: 0.0
  cooperative_weight: 0.0
  revisit_weight: -0.005
  spread_weight: 0.003
  terminal_bonus_scale: 10.0
  terminal_bonus_divide: true

enforce_connectivity: true

warm_start: experiments/survey-local-16fast-N1/checkpoint.npz
warm_start_source_num_agents: 1
