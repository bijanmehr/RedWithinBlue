# Adversarial Phase 1 — DUAL-NASH (POSG): N=5 (3 blue + 2 red).
# Blue = Dec-POMDP (per-agent shared actor, warm-started from solo-explore).
# Red = POMDP (centralized joint policy over the 2 red agents).
# Pretraining: 500 episodes red-only vs. frozen blue, then 1500 joint.
experiment_name: adv-dual-5-2red
env:
  grid_width: 32
  grid_height: 32
  num_agents: 5
  num_red_agents: 2
  wall_density: 0.0
  max_steps: 768
  comm_radius: 5.0
network:
  actor_hidden_dim: 128
  actor_num_layers: 2
  critic_hidden_dim: 128
  critic_num_layers: 2
train:
  method: reinforce
  lr: 5.0e-4
  gamma: 0.90
  num_episodes: 1500
  num_seeds: 5
  red_policy: joint
  red_hidden_dim: 256
  red_num_layers: 2
  red_pretrain_episodes: 500
enforce_connectivity: false
warm_start: experiments/solo-explore/checkpoint.npz
