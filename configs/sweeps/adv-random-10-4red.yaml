# Adversarial Phase 1 — BASELINE-RAND floor: N=10 (6 blue + 4 random red).
experiment_name: adv-random-10-4red
env:
  grid_width: 32
  grid_height: 32
  num_agents: 10
  num_red_agents: 4
  wall_density: 0.0
  max_steps: 768
  comm_radius: 5.0
network:
  actor_hidden_dim: 128
  actor_num_layers: 2
  critic_hidden_dim: 128
  critic_num_layers: 2
train:
  method: reinforce
  lr: 5.0e-4
  gamma: 0.90
  num_episodes: 1500
  num_seeds: 5
  red_policy: random
enforce_connectivity: false
warm_start: experiments/solo-explore/checkpoint.npz
