# Multi-agent sweep: 4 agents on 18x18 (large grid, tests coordination at scale)
# Warm-starts from trained solo-explore checkpoint
experiment_name: multi-4agent-18x18
env:
  grid_width: 18
  grid_height: 18
  num_agents: 4
  wall_density: 0.1
  max_steps: 256
  comm_radius: 5.0
network:
  actor_hidden_dim: 128
  actor_num_layers: 2
  critic_hidden_dim: 128
  critic_num_layers: 2
train:
  method: actor_critic
  lr: 1.5e-4
  gamma: 0.90
  num_episodes: 1000
  num_seeds: 5
enforce_connectivity: true
warm_start: experiments/solo-explore/checkpoint.npz
