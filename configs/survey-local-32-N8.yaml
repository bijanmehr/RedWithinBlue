# Rung 4 of the survey-local warm-start ladder.
#
# 8 agents on 32x32. Warm-starts from the 16x16 N=4 rung via 4 -> 8 per-agent
# block tiling. Again no grid upsampling because local_obs=true keeps obs_dim
# grid-invariant.
experiment_name: survey-local-32-N8

env:
  grid_width: 32
  grid_height: 32
  num_agents: 8
  wall_density: 0.0
  max_steps: 400
  comm_radius: 6.0
  obs_radius: 1
  view_radius: 1
  survey_radius: 0
  local_obs: true
  center_spawn: true
  normalize_uid: true

network:
  actor_hidden_dim: 128
  actor_num_layers: 2
  critic_hidden_dim: 128
  critic_num_layers: 2
  activation: relu

train:
  method: actor_critic
  lr: 1.0e-5
  gamma: 0.99
  num_episodes: 1000
  num_seeds: 5
  ent_coef: 0.005
  epsilon: 0.005
  epsilon_final: 0.005
  ent_coef_final: 0.005
  anneal_end_frac: 0.5
  grad_clip: 0.25

reward:
  disconnect_penalty: 0.0
  isolation_weight: -0.002
  cooperative_weight: 0.015
  revisit_weight: -0.001
  terminal_bonus_scale: 8.0
  terminal_bonus_divide: true

enforce_connectivity: true

warm_start: experiments/survey-local-16-N4/checkpoint.npz
warm_start_source_num_agents: 4
