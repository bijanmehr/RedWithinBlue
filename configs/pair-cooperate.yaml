# Pair cooperation: two agents learn cooperative exploration on a 10x10 grid.
experiment_name: pair-cooperate

env:
  grid_width: 10
  grid_height: 10
  num_agents: 2
  wall_density: 0.0
  max_steps: 100
  comm_radius: 3.0

train:
  method: actor_critic
  lr: 1.5e-4
  gamma: 0.99
  num_episodes: 2000
  num_seeds: 5

enforce_connectivity: true
