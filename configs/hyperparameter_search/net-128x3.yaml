# Network sweep: 128x3 (deeper, 38K params — was unstable without regularization)
experiment_name: net-128x3
env:
  grid_width: 10
  grid_height: 10
  num_agents: 1
  wall_density: 0.0
  max_steps: 100
network:
  actor_hidden_dim: 128
  actor_num_layers: 3
  critic_hidden_dim: 128
  critic_num_layers: 3
train:
  method: actor_critic
  lr: 3.0e-4
  gamma: 0.90
  num_episodes: 1000
  num_seeds: 5
enforce_connectivity: false
