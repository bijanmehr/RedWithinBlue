# Stage 0 — tiny proof-of-life: 1 agent on a 5x5 grid.
# Purpose: confirm the training loop learns meaningfully above random baseline
# (random averages ~0.68 here because max_steps=32 > 25 cells). Uses the same
# actor-critic recipe as solo-explore so this is a genuine signal check, just
# faster. Runs in ~1 min on CPU.
experiment_name: stage0-tiny

env:
  grid_width: 5
  grid_height: 5
  num_agents: 1
  wall_density: 0.0
  max_steps: 32
  comm_radius: 3.0
  obs_radius: 1           # partial observability — otherwise 5x5 is fully seen at t=0

train:
  method: actor_critic
  lr: 3.0e-4
  gamma: 0.95
  num_episodes: 1500
  num_seeds: 5

enforce_connectivity: false
