# Rung 1 of the survey-local warm-start ladder.
#
# Single agent on 8x8. Fresh train — proves the view/survey/local_obs design
# can learn basic exploration with obs_dim=23 (vs. 70+ under the old global
# seen mask on the same grid).
#
# Single-agent means:
#   - no cooperative_weight (no teammates to reward for discoveries)
#   - no isolation_weight (degree is always 0 for N=1 — would penalise every
#     step, so disabled here)
#   - no disconnect_penalty (single agent is always trivially "connected")
#
# Reward shape is therefore pure exploration + revisit + terminal coverage.
experiment_name: survey-local-8-N1

env:
  grid_width: 8
  grid_height: 8
  num_agents: 1
  wall_density: 0.0
  max_steps: 80
  comm_radius: 3.0
  obs_radius: 1
  view_radius: 1
  survey_radius: 0
  local_obs: true
  center_spawn: true
  normalize_uid: true

network:
  actor_hidden_dim: 128
  actor_num_layers: 2
  critic_hidden_dim: 128
  critic_num_layers: 2
  activation: relu

train:
  method: actor_critic
  lr: 3.0e-4
  gamma: 0.99
  num_episodes: 4000
  num_seeds: 5
  ent_coef: 0.02
  epsilon: 0.05
  epsilon_final: 0.005
  ent_coef_final: 0.005
  anneal_end_frac: 0.5
  grad_clip: 0.25

reward:
  disconnect_penalty: 0.0
  isolation_weight: 0.0           # N=1 — would fire every step
  cooperative_weight: 0.0         # N=1 — no neighbours to reward
  revisit_weight: -0.001
  terminal_bonus_scale: 2.0
  terminal_bonus_divide: true

enforce_connectivity: false       # N=1 has no graph edges to preserve
