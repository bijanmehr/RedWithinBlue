# Stepping-stone rung: 1 agent on 16x16.
#
# The N=7/16x16 configs need a tile-compatible N=1 source (7 is prime).  The
# existing survey-local-8-N1 policy was trained on an 8x8 grid; under
# local_obs=true the kernel transfers, but the policy itself never saw a 16x16
# state space, which showed up as ~60% team coverage at N=7.  This rung gives
# us an N=1 policy that actually explored a 16x16 grid to use as the tile source.
experiment_name: survey-local-16-N1

env:
  grid_width: 16
  grid_height: 16
  num_agents: 1
  wall_density: 0.0
  max_steps: 300
  comm_radius: 5.0
  obs_radius: 1
  view_radius: 1
  survey_radius: 0
  local_obs: true
  center_spawn: true
  normalize_uid: true

network:
  actor_hidden_dim: 128
  actor_num_layers: 2
  critic_hidden_dim: 128
  critic_num_layers: 2
  activation: relu

train:
  method: actor_critic
  lr: 1.0e-4                      # gentle off the 8x8 N=1 source
  gamma: 0.99
  num_episodes: 2000
  num_seeds: 5
  ent_coef: 0.02
  epsilon: 0.02
  epsilon_final: 0.005
  ent_coef_final: 0.005
  anneal_end_frac: 0.5
  grad_clip: 0.25

reward:
  disconnect_penalty: 0.0
  isolation_weight: 0.0           # N=1 — no teammates
  cooperative_weight: 0.0
  revisit_weight: -0.001
  terminal_bonus_scale: 4.0
  terminal_bonus_divide: true

enforce_connectivity: false

warm_start: experiments/survey-local-8-N1/checkpoint.npz
warm_start_source_num_agents: 1
